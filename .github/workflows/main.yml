name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        sdk-version: '36'
        ndk-version: '21.4.7075529'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build APK
      run: ./gradlew assembleRelease

    - name: Get version name
      id: get_version
      run: |
        VERSION_NAME=$(grep -E 'versionName\s+\'[^\']+\''|versionName\s+"[^"]+"' app/build.gradle | head -1 | sed -E "s/.*versionName\s+['\"]([^'\"]+)['\"].*/\1/")
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Check build outputs
      run: |
        ls -la
        ls -la app/build/outputs/apk/
        ls -la app/build/outputs/apk/release/ || echo "Release directory not found"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.version_name }}
        release_name: Release v${{ steps.get_version.outputs.version_name }}
        draft: false
        prerelease: false

    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: app/build/outputs/apk/release/*release*.apk
        asset_name: DailyTask-${{ steps.get_version.outputs.version_name }}.apk
        asset_content_type: application/vnd.android.package-archive
