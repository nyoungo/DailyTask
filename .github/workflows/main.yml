name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        sdk-version: '36'
        ndk-version: '21.4.7075529'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build APK
      run: ./gradlew assembleRelease

    - name: Get version name
      id: get_version
      run: |
        VERSION_NAME="2.3.1.0"
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
        echo "unique_tag=v${VERSION_NAME}-${TIMESTAMP}" >> $GITHUB_OUTPUT

    - name: Check build outputs
      run: |
        ls -la
        ls -la app/build/outputs/apk/
        ls -la app/build/outputs/apk/release/

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.unique_tag }}
        release_name: Release ${{ steps.get_version.outputs.unique_tag }}
        draft: false
        prerelease: false

    - name: Find APK file
      id: find_apk
      run: |
        APK_FILE=$(ls app/build/outputs/apk/release/*.apk | head -1)
        echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_FILE"

    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.find_apk.outputs.apk_file }}
        asset_name: DailyTask-${{ steps.get_version.outputs.version_name }}-${{ steps.get_version.outputs.timestamp }}.apk
        asset_content_type: application/vnd.android.package-archive
